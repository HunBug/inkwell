<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inkwell - Annotation Complete</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #333;
        }

        .top-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 56px;
            background: #2c3e50;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 20;
        }

        .top-nav .brand {
            font-weight: 700;
            font-size: 15px;
        }

        .top-nav .links a {
            color: #3498db;
            text-decoration: none;
            margin-left: 14px;
            font-size: 14px;
        }

        .top-nav .links a:hover {
            text-decoration: underline;
        }
        
        .container {
            text-align: center;
            background: white;
            padding: 60px 40px;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 500px;
        }
        
        .emoji {
            font-size: 80px;
            margin-bottom: 20px;
        }
        
        h1 {
            font-size: 32px;
            margin-bottom: 10px;
            color: #222;
        }
        
        p {
            font-size: 16px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        
        .button {
            display: inline-block;
            padding: 12px 30px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-weight: 600;
            transition: all 0.2s;
        }
        
        .button:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102,126,234,0.3);
        }
    </style>
</head>
<body>
    <div class="top-nav">
        <div class="brand">Inkwell — OCR Pipeline</div>
        <div class="links">
            <a href="/">Home</a>
            <a href="/ingest">Ingest</a>
            <a href="/annotate">Annotate</a>
            <a href="/jobs">Jobs</a>
            <a href="/db">DB</a>
        </div>
    </div>
    <div class="container">
        <div class="emoji">🎉</div>
        <h1>All Done!</h1>
        <p>You've successfully annotated all available lines. Great work!</p>
        <a href="/annotate" class="button">Refresh</a>
    </div>
</body>
</html>
