<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inkwell - Edit Annotation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            color: #333;
        }
        
        .container {
            display: flex;
            height: 100vh;
        }
        
        .images-panel {
            flex: 1;
            background: white;
            border-right: 1px solid #ddd;
            overflow-y: auto;
            padding: 20px;
        }
        
        .edit-panel {
            width: 400px;
            background: white;
            border-left: 1px solid #ddd;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }
        
        .back-link {
            display: block;
            margin-bottom: 20px;
            color: #007bff;
            text-decoration: none;
            font-size: 14px;
        }
        
        .back-link:hover {
            text-decoration: underline;
        }
        
        .image-view {
            margin-bottom: 30px;
            border: 1px solid #eee;
            border-radius: 4px;
            padding: 15px;
            background: #fafafa;
        }
        
        .image-view-title {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
            font-weight: 600;
        }
        
        .image-wrapper {
            overflow: auto;
            background: white;
            border-radius: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .image-wrapper.normal {
            max-height: 200px;
        }
        
        .image-wrapper.zoom2x {
            max-height: 250px;
        }
        
        .image-wrapper.zoom4x {
            max-height: 250px;
        }
        
        .image-wrapper img {
            max-width: 100%;
            height: auto;
            display: block;
        }
        
        .zoom2x img {
            transform: scale(2);
            transform-origin: top center;
        }
        
        .zoom4x img {
            transform: scale(4);
            transform-origin: top center;
        }
        
        .edit-form {
            border-top: 1px solid #ddd;
            padding-top: 20px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 13px;
            color: #555;
        }
        
        .ocr-display {
            background: #f9f9f9;
            padding: 10px;
            border-radius: 4px;
            border-left: 3px solid #ddd;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.4;
            word-break: break-word;
            margin-bottom: 15px;
        }
        
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            resize: vertical;
            min-height: 100px;
            line-height: 1.4;
            transition: border-color 0.2s;
        }
        
        textarea:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 0 3px rgba(0,123,255,0.1);
        }
        
        .flags-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .flag-item {
            display: flex;
            align-items: center;
        }
        
        .flag-item input {
            margin-right: 8px;
        }
        
        .flag-item label {
            margin: 0;
            font-weight: 400;
            cursor: pointer;
            flex: 1;
        }
        
        .buttons {
            display: flex;
            gap: 10px;
            margin-top: auto;
        }
        
        button {
            flex: 1;
            padding: 10px 15px;
            font-weight: 600;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }
        
        .btn-save {
            background: #28a745;
            color: white;
        }
        
        .btn-save:hover {
            background: #218838;
        }
        
        .btn-back {
            background: #f0f0f0;
            color: #666;
        }
        
        .btn-back:hover {
            background: #e0e0e0;
        }
        
        .status {
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
            font-size: 13px;
            display: none;
        }
        
        .status.show {
            display: block;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="images-panel">
            <!-- Original Size -->
            <div class="image-view">
                <div class="image-view-title">Original (1x)</div>
                <div class="image-wrapper normal">
                    <img src="/working/line_crops/{{ line.crop_path }}" alt="Line">
                </div>
            </div>
            
            <!-- 2x Zoom -->
            <div class="image-view">
                <div class="image-view-title">Magnified (2x)</div>
                <div class="image-wrapper zoom2x">
                    <img src="/working/line_crops/{{ line.crop_path }}" alt="Line">
                </div>
            </div>
            
            <!-- 4x Zoom -->
            <div class="image-view">
                <div class="image-view-title">Magnified (4x)</div>
                <div class="image-wrapper zoom4x">
                    <img src="/working/line_crops/{{ line.crop_path }}" alt="Line">
                </div>
            </div>
        </div>
        
        <div class="edit-panel">
            <a href="/annotate/review" class="back-link">← Back to Review</a>
            
            <div class="status" id="status"></div>
            
            <div class="form-group">
                <label>OCR Text (Original)</label>
                <div class="ocr-display">{{ line.ocr_text }}</div>
            </div>
            
            <div class="form-group">
                <label for="correctedText">Corrected Text</label>
                <textarea id="correctedText" placeholder="Enter corrected text..." autofocus>{{ line.corrected_text }}</textarea>
            </div>
            
            <div class="form-group">
                <label>Flags</label>
                <div class="flags-group">
                    <div class="flag-item">
                        <input type="checkbox" id="flagSegmentation" value="SEGMENTATION_ISSUE">
                        <label for="flagSegmentation">⚠ Segmentation Issue</label>
                    </div>
                    <div class="flag-item">
                        <input type="checkbox" id="flagUnusable" value="UNUSABLE_SEGMENTATION">
                        <label for="flagUnusable">✕ Unusable Segmentation</label>
                    </div>
                    <div class="flag-item">
                        <input type="checkbox" id="flagNotText" value="NOT_TEXT">
                        <label for="flagNotText">∅ Not Text</label>
                    </div>
                </div>
            </div>
            
            <div class="buttons">
                <button class="btn-save" id="saveBtn">Save</button>
                <button class="btn-back" onclick="history.back()">Cancel</button>
            </div>
        </div>
    </div>
    
    <script>
        const lineId = {{ line.id }};
        const transId = {{ line.trans_id or 'null' }};
        const initialFlags = "{{ line.flag }}".split(";").filter(f => f);
        
        // Restore checkboxes
        initialFlags.forEach(flag => {
            if (flag === "SEGMENTATION_ISSUE") document.getElementById("flagSegmentation").checked = true;
            if (flag === "UNUSABLE_SEGMENTATION") document.getElementById("flagUnusable").checked = true;
            if (flag === "NOT_TEXT") document.getElementById("flagNotText").checked = true;
        });
        
        document.getElementById("saveBtn").addEventListener("click", async () => {
            const correctedText = document.getElementById("correctedText").value.trim();
            const flags = Array.from(document.querySelectorAll(".flag-item input:checked")).map(cb => cb.value);
            
            if (!correctedText && !flags.length) {
                showStatus("Please enter corrected text or select a flag", "error");
                return;
            }
            
            try {
                const response = await fetch("/annotate/api/update", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        line_id: lineId,
                        trans_id: transId,
                        corrected_text: correctedText,
                        flags: flags,
                    }),
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || "Save failed");
                }
                
                showStatus("✓ Saved! Redirecting...", "success");
                setTimeout(() => location.href = "/annotate/review", 1000);
            } catch (err) {
                showStatus("Error: " + err.message, "error");
            }
        });
        
        function showStatus(msg, type) {
            const status = document.getElementById("status");
            status.textContent = msg;
            status.className = `status show ${type}`;
            setTimeout(() => status.classList.remove("show"), 3000);
        }
    </script>
</body>
</html>
